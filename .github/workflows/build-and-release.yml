name: Build & Release Client Plugins

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug to build (or "all" for all clients)'
        required: true
        default: 'all'

permissions:
  contents: write

jobs:
  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build core plugin
        run: |
          ./scripts/build-plugin-zip.sh
          mkdir -p dist
          cp atp-plugin-core-*.zip dist/atp-plugin-core.zip

      - name: Upload core artifact
        uses: actions/upload-artifact@v4
        with:
          name: atp-plugin-core
          path: dist/atp-plugin-core.zip

  list-clients:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.list.outputs.clients }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        shell: bash
        run: |
          set -euo pipefail

          REQUESTED="${{ github.event.inputs.client }}"
          if [ -z "$REQUESTED" ]; then
            REQUESTED="all"
          fi

          if [ "$REQUESTED" = "all" ]; then
            CLIENTS=$(find sites -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | jq -R . | jq -s -c .)
          else
            if [ ! -d "sites/$REQUESTED" ]; then
              echo "Unknown client: $REQUESTED" >&2
              exit 1
            fi
            CLIENTS=$(printf '%s\n' "$REQUESTED" | jq -R . | jq -s -c .)
          fi

          echo "clients=$CLIENTS" >> "$GITHUB_OUTPUT"

  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: list-clients
    strategy:
      fail-fast: false
      matrix:
        client: ${{ fromJSON(needs.list-clients.outputs.clients) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin for ${{ matrix.client }}
        run: ./scripts/build-site.sh "${{ matrix.client }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atp-campaign-site-${{ matrix.client }}
          path: dist/atp-campaign-site-${{ matrix.client }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-core
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
